services:
  - type: web
    name: blog-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4"
    rootDir: backend
    plan: free
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        sync: false # Set manually from Supabase connection string
      - key: CSRF_TRUSTED_ORIGINS
        sync: false # e.g.: https://blog-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false # e.g.: https://your-frontend.vercel.app
      - key: WEB_CONCURRENCY
        value: 4
